include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # required for freezed + json_serializable: their annotations target
    # metadata-only symbols; without this ignore, the analyzer reports
    # `invalid_annotation_target` warnings for every @freezed / @JsonSerializable
    invalid_annotation_target: ignore
  exclude:
    # Generated by build_runner; hand-editing will be lost on next codegen
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.config.dart"
    # Build artifacts
    - "build/**"
    - ".dart_tool/**"
    # Planning docs (markdown, not Dart)
    - ".planning/**"

linter:
  rules:
    - prefer_const_constructors
    - prefer_const_literals_to_create_immutables
    - prefer_final_locals
    - avoid_print
    - require_trailing_commas
    - sort_child_properties_last
