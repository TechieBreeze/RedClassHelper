name: redclass
description: "红课复习 — 本地化大学课程复习工具"
publish_to: 'none'
version: 0.1.0+1

environment:
  # Dart 3.12.2 is bundled with Flutter 3.44.2 (installed in Plan 01-00)
  # ^3.12.2 is the minimum that supports Riverpod 3.x + analyzer 7.x
  sdk: ^3.12.2
  # Lower bound from STACK.md locked Flutter 3.35.7
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Riverpod 3.x with @riverpod codegen (D-03, RESEARCH Pattern 3)
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # drift ORM on SQLite — STOR-01
  # sqlite3_flutter_libs bundles pre-compiled .so for Android — avoids network
  # download during build (the sqlite3 hook hits GitHub which times out in CI/CN).
  drift: ^2.34.0
  sqlite3_flutter_libs: ^0.5.38
  path: ^1.9.1
  path_provider: ^2.1.6

  # go_router 17.x — declarative routing, 6 routes planned (Plan 01-04)
  go_router: ^17.3.0

  # Material You dynamic color — D-20
  # Returns nullable ColorScheme?; null on most platforms → fallback to seed color
  dynamic_color: ^1.8.1

  # freezed 3.x for sealed classes (Phase 2+ QuestionType / ReviewMode)
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Phase 2: File import pipeline dependencies
  archive: ^4.0.9          # ZIP decode for .docx
  xml: ^6.5.0              # WordprocessingML traversal
  pdfrx: ^2.4.4           # PDF text extraction + rendering via PDFium
  file_picker: ^11.0.2     # Native file dialog (desktop only)
  desktop_drop: ^0.7.1     # Drag-and-drop file import (desktop)
  uuid: ^4.5.1             # UUID generation for ParseJob IDs

  # Phase 3: LLM integration dependencies
  http: ^1.2.0
  crypto: ^3.0.7
  range_request: ^0.2.0

  # Phase 3 FFI: dart:ffi helper utilities (Utf8, calloc, etc.)
  ffi: ^2.1.3

  # Phase 4: Quiz settings persistence (shared_preferences)
  shared_preferences: ^2.3.0

  # Noto Sans SC — consistent CJK font with even stroke weight
  google_fonts: ^6.2.1

  # intl deferred to Phase 5 per CONTEXT.md "Claude's Discretion"

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Flutter 3.44.2 default; flutter_lints 5.x incompatible with analyzer 7.x shipped with Dart 3.12
  flutter_lints: ^6.0.0

  # Phase 5: end-to-end mobile import flow — runs on Android device / emulator
  # (CI cannot execute this in current Windows env; deferred to developer runs).
  integration_test:
    sdk: flutter

  # Single build_runner drives ALL codegen (D-06) — drift + freezed + json_serializable + riverpod_generator
  build_runner: ^2.4.13

  # Codegen trio
  riverpod_generator: ^4.0.4
  drift_dev: ^2.34.0
  freezed: ^3.2.5
  json_serializable: ^6.8.0

  # NOTE: custom_lint + riverpod_lint removed in Plan 01-01 Task 2
  # Reason: custom_lint 0.8.x still pins analyzer ^7.5.0 / ^8.0.0, but drift_dev ^2.34.0
  # (required for STOR-01) needs analyzer ^10.0.0 - ^13.0.0. The two are mutually
  # exclusive in current pub.dev resolution. riverpod_generator 4.0.4 itself works
  # without riverpod_lint; we can re-add the lint package in a later phase if/when
  # custom_lint catches up to analyzer 10+. Tracked as a deferred item.

# sqlite3 native asset hook: use system SQLite to avoid GitHub download
# (network timeout in CN). sqlite3_flutter_libs provides runtime libs.
hooks:
  user_defines:
    sqlite3:
      source: system

flutter:
  uses-material-design: true
  assets:
    - assets/fixtures/
    - assets/grammar/
